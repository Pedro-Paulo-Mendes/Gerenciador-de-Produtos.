<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Produtos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1><i class="fa-solid fa-box-open"></i> Gestão de Produtos Oak </h1>
        </header>

        <section id="tela-listagem" class="fade-in">
            <div class="acoes-topo">
                <div class="busca-container">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="busca-produto" placeholder="Buscar produto...">
                </div>
                <button id="btn-novo-produto" class="btn-primary">
                    <i class="fa-solid fa-plus"></i> Novo
                </button>
            </div>
            
            <div class="tabela-container">
                <table id="tabela-produtos">
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Nome</th>
                            <th>Valor</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo"></tbody>
                </table>
                <div id="estado-vazio" class="hidden">
                    <i class="fa-solid fa-folder-open"></i>
                    <p>Nenhum produto cadastrado.</p>
                </div>
            </div>
        </section>

        <section id="tela-cadastro" class="hidden fade-in">
            <h2 id="titulo-form">Novo Produto</h2>
            <form id="form-produto">
                <input type="hidden" id="produto-id">

                <div class="form-group">
                    <label for="imagem">Foto (Máx: 2MB)</label>
                    <input type="file" id="imagem" accept="image/jpeg, image/png, image/webp">
                    <img id="preview-imagem" class="hidden preview-img" src="" alt="Preview">
                </div>

                <div class="form-group">
                    <label for="nome">Nome do Produto</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" rows="3" required></textarea>
                </div>

                <div class="form-linha">
                    <div class="form-group">
                        <label for="valor">Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="disponivel">Disponível</label>
                        <select id="disponivel">
                            <option value="sim">Sim</option>
                            <option value="nao">Não</option>
                        </select>
                    </div>
                </div>

                <div class="botoes-form">
                    <button type="submit" class="btn-primary">Salvar</button>
                    <button type="button" class="btn-secondary" id="btn-cancelar">Cancelar</button>
                </div>
            </form>
        </section>
    </main>

    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h3>Excluir Produto</h3>
            <p>Deseja realmente excluir este item? A ação não pode ser desfeita.</p>
            <div class="botoes-form">
                <button id="btn-confirmar-exclusao" class="btn-danger">Excluir</button>
                <button id="btn-cancelar-exclusao" class="btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>
    
    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
